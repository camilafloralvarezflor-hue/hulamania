# =============================================================
# HULAMANIA — Panel de Administración (Sveltia CMS)
# Compatible con Decap CMS / Netlify CMS
# =============================================================

backend:
  name: github
  repo: camilafloralvarezflor-hue/hulamania
  branch: main
  # Sveltia CMS maneja el login con GitHub automáticamente.
  # No necesitás crear OAuth App ni configurar ningún proxy.

# ── Archivos de imagen subidos desde el panel ───────────────
media_folder: uploads/blog
public_folder: /uploads/blog

# ── Configuración general ───────────────────────────────────
site_url: https://hulamania.com
display_url: https://hulamania.com
logo_url: https://hulamania.com/uploads/logo.png
locale: es

# ── Colecciones ─────────────────────────────────────────────
collections:

  - name: posts
    label: "Blog de Novedades"
    label_singular: "Novedad"
    folder: posts
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "blog/?post={{slug}}"
    summary: "{{title}} — {{date}}"

    fields:
      - label: "Título"
        name: title
        widget: string
        hint: "El título principal del post."

      - label: "Fecha"
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "DD/MM/YYYY"
        time_format: false
        default: ""

      - label: "Resumen"
        name: excerpt
        widget: text
        required: false
        hint: "2-3 oraciones que se muestran en la lista del blog."

      - label: "Imagen destacada"
        name: thumbnail
        widget: image
        required: false
        hint: "Aparece en la tarjeta y al inicio del post."

      - label: "Contenido"
        name: body
        widget: markdown
        hint: "El cuerpo completo del post. Usá los botones de formato."
